# Separate app/API host override
#
# This extends the default source-build services and only changes the
# browser-facing topology needed to test separate frontend and API origins.
#
# Usage:
#   docker compose -f docker-compose.test-separate-hosts.yml up --build
#
# Access:
#   App: http://localhost:3001
#   API: http://localhost:8001/api/v1

services:
  api:
    extends:
      file: docker-compose.yml
      service: api
    container_name: hermes-api-test
    env_file: !override []
    ports: !override
      - "8001:8000"
    environment:
      - HERMES_SECRET_KEY=${HERMES_SECRET_KEY:-test-secret-key-for-development-only}
      - HERMES_REDIS_URL=redis://redis:6379
      - HERMES_DEBUG=true
      - HERMES_ALLOWED_ORIGINS=http://localhost:3001,http://127.0.0.1:3001

  celery_worker:
    extends:
      file: docker-compose.yml
      service: celery_worker
    container_name: hermes-worker-test
    env_file: !override []
    environment:
      - HERMES_SECRET_KEY=${HERMES_SECRET_KEY:-test-secret-key-for-development-only}
      - HERMES_REDIS_URL=redis://redis:6379
      - HERMES_DEBUG=true

  app:
    extends:
      file: docker-compose.yml
      service: app
    container_name: hermes-app-test
    ports:
      - "3001:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8001/api/v1
    volumes: !override []

  redis:
    extends:
      file: docker-compose.yml
      service: redis
    container_name: hermes-redis-test
    volumes:
      - redis_test_data:/data

networks:
  hermes-network:
    driver: bridge

volumes:
  redis_test_data:
